# 単独リポジトリ（minor-trouble）のルートに本プロジェクトを置いたときに使用します。
# quarto publish gh-pages は「リモートに gh-pages がある」前提で失敗しやすいため、
# render 後に peaceiris/actions-gh-pages で _site を載せ替えます。
name: Publish Quarto site

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render site
        run: quarto render

      # GitHub Pages が Jekyll 処理しないようにする（Quarto の静的HTML用）
      - name: Add .nojekyll
        run: touch _site/.nojekyll

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
