# 単独リポジトリ（minor-trouble）のルートに本プロジェクトを置いたときに使用します。
# quarto publish gh-pages は「リモートに gh-pages がある」前提で失敗しやすいため、
# render 後に peaceiris/actions-gh-pages で _site を載せ替えます。
name: Publish Quarto site

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    # Node 20 ランタイム廃止に先立ち、JS アクションを Node 24 で実行（peaceiris 等は未更新でも警告緩和）
    # https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render site
        run: quarto render

      # GitHub Pages が Jekyll 処理しないようにする（Quarto の静的HTML用）
      - name: Add .nojekyll
        run: touch _site/.nojekyll

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
