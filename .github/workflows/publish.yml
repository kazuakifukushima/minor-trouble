# 単独リポジトリ（minor-trouble）のルートに本フォルダの内容を置いたときに使用されます。
# medical-intelligence-lab 内のサブフォルダのまま運用する場合は、親リポジトリ側のワークフローを使ってください。
name: Publish Quarto site

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      # Quarto 公式: gh-pages へ push するために GITHUB_TOKEN が必要
      # https://quarto.org/docs/publishing/github-pages.html
      - name: Render and publish to GitHub Pages
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
